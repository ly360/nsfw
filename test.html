<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>NSFW Audit Test</title>
</head>
<body>

<h1>NSFW Image Audit 测试页</h1>

<form id="form">
  <p>
    <input type="file" id="file" name="file" accept="image/jpeg,image/png,image/webp" required>
  </p>
  <p>
    <button type="submit">上传并审计</button>
  </p>
</form>

<h2>预览</h2>
<p><img id="preview" alt="(未选择图片)" width="320"></p>

<h2>结果</h2>
<pre id="result">(等待上传)</pre>

<script>
const form = document.getElementById('form');
const fileInput = document.getElementById('file');
const preview = document.getElementById('preview');
const result = document.getElementById('result');

fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if (f) preview.src = URL.createObjectURL(f);
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const f = fileInput.files[0];
  if (!f) return;

  result.textContent = '审计中 ...';
  const fd = new FormData();
  fd.append('file', f);

  const t0 = performance.now();
  try {
    const resp = await fetch('/audit/image', { method: 'POST', body: fd });
    const data = await resp.json();
    const rtt = Math.round(performance.now() - t0);
    result.textContent =
      'HTTP ' + resp.status + '  (round-trip ' + rtt + 'ms)\n' +
      JSON.stringify(data, null, 2);
  } catch (err) {
    result.textContent = '请求失败: ' + err;
  }
});
</script>

</body>
</html>
